<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Git Simple Compare">
  <defs>
    <linearGradient id="bg" x1="16" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#183242"/>
      <stop offset="0.52" stop-color="#111c24"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(39 22) rotate(51) scale(94 76)">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.2"/>
      <stop offset="0.6" stop-color="#2dd4bf" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gitMark" x1="37" y1="12" x2="91" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9a57"/>
      <stop offset="0.45" stop-color="#f97316"/>
      <stop offset="1" stop-color="#e34c26"/>
    </linearGradient>
    <linearGradient id="diffPanel" x1="52" y1="74" x2="108" y2="109" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151f2a"/>

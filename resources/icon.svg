    <path d="M64 58l16 16" fill="none" stroke="#fff7ed" stroke-width="7" stroke-linecap="round"/>
    <circle cx="47" cy="41" r="7.5" fill="#e34c26" stroke="#fff7ed" stroke-width="5"/>
